server.port=${PORT:8080}
spring.thymeleaf.cache=true

openai.api.key=${OPENAI_API_KEY:}

# Database: uses H2 locally, PostgreSQL on Render via env vars
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/stockdb}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# H2 Console (disable in production)
spring.h2.console.enabled=${H2_CONSOLE:true}
spring.h2.console.path=/h2-console